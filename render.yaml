services:
  - type: web
    name: workout-backend
    runtime: python
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard (Neon connection string)
      - key: CORS_ORIGINS
        sync: false          # Set to your Vercel URL e.g. https://your-app.vercel.app
      - key: PYTHON_VERSION
        value: "3.11.0"
